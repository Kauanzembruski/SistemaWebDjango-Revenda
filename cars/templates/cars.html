{% extends "base.html"%}

{% block content %}
<style>
  .car-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .car-card {
    background: #1b2a33;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    transition: all 0.4s ease;
    position: relative;
  }

  .car-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 20px 45px rgba(0, 0, 0, 0.7);
  }

  .car-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    transition: 0.4s ease;
  }

  .car-card:hover img {
    transform: scale(1.05);
  }

  .car-card h2 {
    font-size: 1.3rem;
    margin: 15px 15px 5px;
    color: #ffffff;
    font-weight: 600;
  }

  .car-card p {
    font-size: 1rem;
    margin: 0 15px 20px;
    color: #90e0ef;
    font-weight: 500;
  }

  /* Badge de ano */
  .car-card::after {
    content: "Disponível";
    position: absolute;
    top: 15px;
    left: 15px;
    background: #00b4d8;
    color: #000;
    padding: 5px 12px;
    font-size: 12px;
    border-radius: 20px;
    font-weight: bold;
  }

  /* FORMULÁRIO DE BUSCA */
  form {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin: 30px auto;
    max-width: 600px;
    padding: 0 20px;
  }

  input[type="text"] {
    flex: 1;
    padding: 12px 15px;
    font-size: 15px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #1b2a33;
    color: #fff;
    box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
    transition: 0.3s ease;
  }

  input[type="text"]:focus {
    box-shadow: 0 0 10px #00b4d8;
  }

  button[type="submit"] {
    background: #00b4d8;
    color: #000;
    border: none;
    padding: 12px 22px;
    font-size: 15px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s ease;
  }

  button[type="submit"]:hover {
    background: #90e0ef;
    transform: scale(1.05);
  }

  .no-results {
    text-align: center;
    grid-column: 1 / -1;
    font-size: 1.2rem;
    color: #ccc;
  }

  @media (max-width: 768px) {
    .car-grid {
      gap: 20px;
    }
  }
</style>

<form method="GET" action="{% url 'cars_list' %}">
  <input type="text" name="search" placeholder="Buscar carro...">
  <button type="submit">Buscar</button>
</form>

<div class="car-grid">
  {% if cars %}
  {% for car in cars %}
  <div class="car-card">
    <img src="{{ car.photo.url }}" alt="{{ car.model }} - {{ car.brand }}">
    <h2>{{ car.brand }} {{ car.model }}</h2>
    <p>{{ car.factory_year }} - R$ {{ car.value }}</p>
  </div>
  {% endfor %}
  {% else %}
  <p class="no-results">Nenhum carro encontrado.</p>
  {% endif %}
</div>
{% endblock %}
