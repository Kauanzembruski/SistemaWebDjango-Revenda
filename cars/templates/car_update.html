{% extends "base.html" %}

{% block content %}

<style>
  body {
    background: linear-gradient(135deg, #0f172a, #0b1e26);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .form-container {
    max-width: 850px;
    margin: 60px auto;
    padding: 40px;
    background: linear-gradient(145deg, #1b2a33, #142029);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    animation: fadeIn 0.6s ease-in-out;
  }

  .form-container h1 {
    text-align: center;
    color: #00e0ff;
    margin-bottom: 35px;
    font-size: 2rem;
    letter-spacing: 1px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    text-align: left;
    padding-bottom: 5px;
    font-weight: 600;
    color: #ffffff;
  }

  td {
    padding-bottom: 18px;
  }

  input[type="text"],
  input[type="number"],
  input[type="file"],
  select,
  textarea {
    width: 100%;
    padding: 12px 15px;
    border-radius: 12px;
    border: none;
    background: #0f172a;
    color: #fff;
    font-size: 15px;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
    transition: 0.3s ease;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: none;
    box-shadow: 0 0 15px #00e0ff;
  }

  .buttons-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
  }

  .btn {
    padding: 14px 28px;
    font-size: 15px;
    border-radius: 12px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    transition: 0.3s ease;
    text-decoration: none;
    display: inline-block;
  }

  .btn-primary {
    background: linear-gradient(45deg, #00b4d8, #00e0ff);
    color: #000;
  }

  .btn-primary:hover {
    transform: scale(1.07);
    box-shadow: 0 0 20px #00e0ff;
  }

  .btn-secondary {
    background: #334155;
    color: #fff;
  }

  .btn-secondary:hover {
    background: #475569;
    transform: scale(1.05);
  }

  .errorlist {
    color: #ff4d4d;
    font-size: 14px;
    list-style: none;
    padding-left: 0;
    margin-top: 5px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
    .form-container {
      padding: 25px;
    }
  }
</style>

<div class="form-container">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <h1>🚗 Editar Veículo</h1>

    <table>
      {{ form.as_table }}
    </table>

    <div class="buttons-container">
      <input type="submit" value="💾 Salvar Alterações" class="btn btn-primary">
      <a href="{% url 'cars_list' %}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>

{% endblock %}
