{% extends "base.html" %}

{% block content %}

<style>
  body {
    background: linear-gradient(135deg, #0f172a, #0b1e26);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .delete-container {
    max-width: 700px;
    margin: 80px auto;
    padding: 40px;
    background: linear-gradient(145deg, #1b2a33, #142029);
    border-radius: 20px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.8);
    text-align: center;
    animation: fadeIn 0.5s ease-in-out;
  }

  .delete-container h1 {
    color: #ff4d4d;
    font-size: 2rem;
    margin-bottom: 20px;
  }

  .delete-container p {
    color: #ffffff;
    font-size: 18px;
    margin-bottom: 25px;
  }

  .car-highlight {
    background: #0f172a;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 30px;
    font-weight: bold;
    color: #00e0ff;
    font-size: 18px;
  }

  .buttons-container {
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  .btn {
    padding: 14px 28px;
    font-size: 15px;
    border-radius: 12px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    transition: 0.3s ease;
    text-decoration: none;
    display: inline-block;
  }

  .btn-danger {
    background: linear-gradient(45deg, #ff4d4d, #ff0000);
    color: white;
  }

  .btn-danger:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px #ff0000;
  }

  .btn-secondary {
    background: #334155;
    color: white;
  }

  .btn-secondary:hover {
    background: #475569;
    transform: scale(1.05);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<div class="delete-container">
  <h1>⚠ Confirmar Exclusão</h1>

  <p>Você está prestes a remover o veículo:</p>

  <div class="car-highlight">
    {{ object.brand }} {{ object.model }} — {{ object.factory_year }}
  </div>

  <p>Essa ação não pode ser desfeita.</p>

  <form method="post">
    {% csrf_token %}
    <div class="buttons-container">
      <button type="submit" class="btn btn-danger">🗑 Confirmar Exclusão</button>
      <a href="{% url 'cars_list' %}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>

{% endblock %}
