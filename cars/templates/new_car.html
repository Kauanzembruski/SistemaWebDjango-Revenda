{% extends "base.html" %}

{% block content %}

<style>
  body {
    background: linear-gradient(135deg, #141e30, #243b55);
  }

  .form-container {
    max-width: 700px;
    margin: 60px auto;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(15px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    color: #ffffff;
  }

  .form-container h2 {
    text-align: center;
    margin-bottom: 30px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  form p {
    display: flex;
    flex-direction: column;
    font-size: 14px;
  }

  form label {
    margin-bottom: 6px;
    font-weight: 500;
  }

  form input,
  form select,
  form textarea {
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: #000000;
    font-size: 14px;
    transition: 0.3s ease;
  }

  form input:focus,
  form select:focus,
  form textarea:focus {
    box-shadow: 0 0 12px #00b4d8;
  }

  input[type="file"] {
    padding: 10px;
  }

  .submit-btn {
    margin-top: 10px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #00b4d8;
    color: #000;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s ease;
  }

  .submit-btn:hover {
    background: #90e0ef;
    transform: scale(1.05);
  }

  @media (max-width: 768px) {
    .form-container {
      margin: 20px;
      padding: 25px;
    }
  }
</style>

<div class="form-container">
  <h2>Cadastrar Novo Carro</h2>

  <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="submit-btn">Cadastrar</button>
  </form>
</div>

{% endblock %}
