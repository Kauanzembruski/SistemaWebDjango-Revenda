{% extends "base.html"%}

{% block content %}

<style>
  body {
    background: linear-gradient(135deg, #141e30, #243b55);
  }

  .register-container {
    max-width: 450px;
    margin: 80px auto;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(15px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    color: #ffffff;
  }

  .register-container h2 {
    text-align: center;
    margin-bottom: 30px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
  }

  label {
    margin-bottom: 6px;
    font-weight: 500;
    font-size: 14px;
  }

  input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 14px;
    transition: 0.3s ease;
  }

  input:focus {
    box-shadow: 0 0 12px #00b4d8;
  }

  input[type="submit"] {
    margin-top: 10px;
    background: #00b4d8;
    color: #000;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
  }

  input[type="submit"]:hover {
    background: #90e0ef;
    transform: scale(1.05);
  }

  .errorlist {
    list-style: none;
    padding: 8px;
    margin-bottom: 8px;
    background: rgba(255, 0, 0, 0.2);
    border-radius: 8px;
    font-size: 13px;
    color: #ffb3b3;
  }

  @media (max-width: 768px) {
    .register-container {
      margin: 30px 20px;
      padding: 25px;
    }
  }
</style>

<div class="register-container">
  <h2>Criar Conta</h2>

  <form method="post">
      {% csrf_token %}

      <div class="form-group">
          {{ user_form.username.errors }}
          <label>Usuário</label>
          {{ user_form.username }}
      </div>

      <div class="form-group">
          {{ user_form.password1.errors }}
          <label>Senha</label>
          {{ user_form.password1 }}
      </div>

      <div class="form-group">
          {{ user_form.password2.errors }}
          <label>Repita a senha</label>
          {{ user_form.password2 }}
      </div>

      <div class="form-group">
          <input type="submit" value="Cadastrar">
      </div>

  </form>
</div>

{% endblock %}
